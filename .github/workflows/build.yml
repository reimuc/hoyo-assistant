name: 📦 CI Build

on:
  push:
    branches: [ "main" ]
    paths: [ "**/*.py", "pyproject.toml" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ "ubuntu-latest", "windows-latest" ]
        python: [ "3.13" ]

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: 💾 Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller
          pip install -e .

      - name: 🔨 Build Wheel and Sdist
        run: python -m build

      - name: 🔨 Build Executable (Windows)
        if: runner.os == 'Windows'
        run: |
          python -c "print('from hoyo_assistant.cli import main; main()', file=open('build_entry.py', 'w'))"
          pyinstaller --onefile --name hoyo-assistant --collect-all hoyo_assistant --add-data "src/hoyo_assistant/locales;hoyo_assistant/locales" build_entry.py

      - name: 🔨 Build Executable (Linux)
        if: runner.os != 'Windows'
        run: |
          python3 -c "print('from hoyo_assistant.cli import main; main()', file=open('build_entry.py', 'w'))"
          pyinstaller --onefile --name hoyo-assistant --collect-all hoyo_assistant --add-data "src/hoyo_assistant/locales:hoyo_assistant/locales" build_entry.py

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}
          path: dist/*
